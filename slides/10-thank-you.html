<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 10 - Thank You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #4ecdc4;
            --dark: #1a1a2e;
            --light: #f5f6fa;
            --white: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6b6b8a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .slide {
            width: 1280px;
            height: 720px;
            background: var(--dark);
            position: relative;
            overflow: hidden;
        }
        
        .gradient-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
        }
        
        .orb-1 {
            top: -200px;
            right: -200px;
            width: 500px;
            height: 500px;
            background: var(--primary);
            opacity: 0.2;
        }
        
        .orb-2 {
            bottom: -200px;
            left: -200px;
            width: 500px;
            height: 500px;
            background: var(--secondary);
            opacity: 0.15;
        }
        
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }
        
        .thank-you {
            font-size: 64px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        
        .subtitle {
            font-size: 20px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 50px;
        }
        
        .divider {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 2px;
            margin: 0 auto 40px;
        }
        
        .supervisor-section {
            margin-bottom: 50px;
        }
        
        .supervisor-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        
        .supervisor-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--white);
        }
        
        .author-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .author-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 10px;
        }
        
        .author-name {
            font-size: 22px;
            font-weight: 600;
            color: var(--white);
        }
        
        .author-nrp {
            font-size: 16px;
            font-weight: 500;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .slide-number {
            position: absolute;
            bottom: 30px;
            right: 60px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="gradient-bar"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        
        <div class="content">
            <h1 class="thank-you">Thank You</h1>
            <p class="subtitle">Thank you for your attention</p>
            
            <div class="divider"></div>
            
            <div class="supervisor-section">
                <p class="supervisor-label">Supervisor</p>
                <p class="supervisor-name">Dr. Ir. F.X Ferdinandus, M.T.</p>
            </div>
            
            <div class="author-section">
                <div class="author-logo">K</div>
                <span class="author-name">Kelun Kaka Santoso</span>
                <span class="author-nrp">NRP 222117039</span>
            </div>
        </div>
        
        <span class="slide-number">10 / 10</span>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 01 - Title</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #4ecdc4;
            --dark: #1a1a2e;
            --light: #f5f6fa;
            --white: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6b6b8a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .slide {
            width: 1280px;
            height: 720px;
            background: var(--dark);
            position: relative;
            overflow: hidden;
        }
        
        .gradient-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
        }
        
        .orb-1 {
            position: absolute;
            top: -150px;
            right: -150px;
            width: 500px;
            height: 500px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            filter: blur(80px);
        }
        
        .orb-2 {
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: var(--secondary);
            border-radius: 50%;
            opacity: 0.2;
            filter: blur(80px);
        }
        
        .content {
            position: relative;
            z-index: 1;
            padding: 80px 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 16px;
            font-size: 28px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 50px;
        }
        
        h1 {
            font-size: 44px;
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            max-width: 800px;
        }
        
        h1 span {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 20px;
            font-weight: 300;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 60px;
            max-width: 600px;
        }
        
        .meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .author {
            font-size: 22px;
            font-weight: 600;
            color: var(--white);
        }
        
        .nrp {
            font-size: 16px;
            font-weight: 500;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .program {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .supervisor {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 8px;
            font-style: italic;
        }
        
        .app-preview {
            position: absolute;
            right: 80px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            height: 500px;
            background: var(--white);
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
        }
        
        .app-screen {
            width: 100%;
            height: 100%;
            background: var(--light);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        
        .app-header {
            height: 60px;
            background: var(--dark);
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .app-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: white;
        }
        
        .app-title {
            font-size: 12px;
            color: var(--white);
            font-weight: 500;
        }
        
        .app-content {
            padding: 16px;
        }
        
        .app-card {
            background: var(--white);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .app-card-header {
            height: 8px;
            width: 60%;
            background: var(--light);
            border-radius: 4px;
            margin-bottom: 10px;
        }
        
        .app-card-line {
            height: 6px;
            background: var(--light);
            border-radius: 3px;
            margin-bottom: 6px;
        }
        
        .app-card-line:last-child {
            width: 80%;
        }
        
        .app-btn {
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            margin-top: 8px;
        }
        
        .slide-number {
            position: absolute;
            bottom: 30px;
            right: 60px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="gradient-bar"></div>
        <div class="orb-1"></div>
        <div class="orb-2"></div>
        
        <div class="content">
            <div class="logo-mark">K</div>
            <h1>Multiplatform Integrated<br><span>E-Commerce</span> and Goods<br>Distribution System</h1>
            <div class="meta">
                <span class="author">Kelun Kaka Santoso</span>
                <span class="nrp">NRP 222117039</span>
                <span class="supervisor">Supervisor: Dr. Ir. F.X Ferdinandus, M.T.</span>
            </div>
        </div>
        
        <div class="app-preview">
            <div class="app-screen">
                <div class="app-header">
                    <div class="app-avatar">K</div>
                    <span class="app-title">Store</span>
                </div>
                <div class="app-content">
                    <div class="app-card">
                        <div class="app-card-header"></div>
                        <div class="app-card-line"></div>
                        <div class="app-card-line"></div>
                        <div class="app-card-line"></div>
                    </div>
                    <div class="app-card">
                        <div class="app-btn"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <span class="slide-number">01 / 10</span>
    </div>
</body>
</html>

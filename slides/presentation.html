<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesis Presentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #4ecdc4;
            --dark: #1a1a2e;
            --white: #ffffff;
            --text-muted: #6b6b8a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--white);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        
        .slide-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .slide-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 100px;
            background: rgba(255,255,255,0.05);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--white);
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .nav-arrow:hover {
            background: rgba(108,99,255,0.3);
        }
        
        .nav-arrow:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }
        
        .nav-arrow:disabled:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .nav-left {
            left: 0;
            border-radius: 0 12px 12px 0;
        }
        
        .nav-right {
            right: 0;
            border-radius: 12px 0 0 12px;
        }
        
        .slide-counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: var(--text-muted);
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <iframe id="slideFrame" src="01-title.html"></iframe>
        
        <button class="nav-arrow nav-left" id="prevBtn" onclick="prevSlide()" disabled>◀</button>
        <button class="nav-arrow nav-right" id="nextBtn" onclick="nextSlide()">▶</button>
        
        <div class="slide-counter" id="slideCounter">01 / 10</div>
    </div>
    
    <script>
        const totalSlides = 10;
        let currentSlide = 1;
        
        const slides = [
            '01-title.html',
            '02-background.html',
            '03-objectives.html',
            '04-architecture.html',
            '05-admin-features.html',
            '06-customer-features.html',
            '07-courier-features.html',
            '08-constraints.html',
            '09-conclusion.html',
            '10-thank-you.html'
        ];
        
        function updateUI() {
            document.getElementById('slideFrame').src = slides[currentSlide - 1];
            document.getElementById('slideCounter').textContent = 
                String(currentSlide).padStart(2, '0') + ' / ' + totalSlides;
            
            document.getElementById('prevBtn').disabled = currentSlide === 1;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides;
        }
        
        function nextSlide() {
            if (currentSlide < totalSlides) {
                currentSlide++;
                updateUI();
            }
        }
        
        function prevSlide() {
            if (currentSlide > 1) {
                currentSlide--;
                updateUI();
            }
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            }
        });
        
        updateUI();
    </script>
</body>
</html>

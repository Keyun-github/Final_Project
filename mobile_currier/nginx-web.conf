server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web is an SPA — fallback ke index.html untuk semua
    # route yang tidak punya file fisik di disk. Tanpa ini,
    # user yang refresh halaman di /dashboard akan dapat 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets — Flutter web punya banyak file dengan
    # hash di nama file (main.dart.js?v=...), jadi immutable
    # aman dipakai.
    location ~* \.(js|css|png|svg|woff2?|ttf|ico|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Jangan cache index.html — supaya deploy baru selalu ke-load
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Service worker juga no-cache
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}